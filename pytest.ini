[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Add markers for test categorization
markers =
    unit: Unit tests for isolated components
    integration: Integration tests for component interactions
    e2e: End-to-end tests for complete flows
    critical: Critical tests that must pass (currency conversion correctness)
    edge_case: Edge case and error handling tests
    currency_pair: Tests for specific currency pair combinations
    zero_decimal: Tests for zero-decimal currencies (CLP, COP, JPY, KRW)
    three_decimal: Tests for three-decimal currencies (KWD, BHD, OMR)
    regression: Regression tests for known bugs
    bug_2_3m: Tests specifically for the €2.3M incident
    slow: Slow-running tests
    requires_external: Tests requiring external services
    asyncio: Async tests using asyncio

# Asyncio configuration
asyncio_mode = auto

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (prevent hanging tests)
timeout = 30
timeout_method = thread

# Parallel execution settings
# Run with: pytest -n auto
# This will use all available CPU cores

# Coverage settings
[coverage:run]
source = framework
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = reports/coverage_html
